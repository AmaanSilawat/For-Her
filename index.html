<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="start-screen" id="startScreen">
  <button class="start-btn" onclick="start()">Please click on me</button>
</div>

<div class="card-screen hidden" id="cardScreen">
  <div class="card-container">
    <div class="card" id="cardBox">
      <img id="cardImage" class="card-img" src="" alt="">
      <p id="cardText"></p>
    </div>
  </div>
  <p class="swipe-text">Swipe to read more →</p>
</div>

<script src="script.js"></script>
</body>
</html>
